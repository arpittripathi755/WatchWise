<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WatchWise</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="navbar-container">
        <div class="nav-left">
          <img
            src="./watchwiselogo-Photoroom.png"
            class="logo"
            alt="WatchWise logo" />
          <span class="brand-name">WATCHWISE</span>
        </div>

        <nav class="nav-center">
          <a href="#" class="nav-link active">Movies</a>
          <a href="#" class="nav-link">Popular</a>
        </nav>

        <div class="nav-right">
          <button id="searchToggle" class="icon-btn" aria-label="Search">
            <i class="bi bi-search"></i>
          </button>
          <button class="icon-btn" aria-label="Notifications">
            <i class="bi bi-bell"></i>
          </button>
          <button class="icon-btn" aria-label="Options">
            <i class="bi bi-three-dots"></i>
          </button>
          <button class="profile-btn" aria-label="Profile">
            <i class="bi bi-person-fill"></i>
          </button>

          <div id="searchPopover" class="search-popover" aria-hidden="true">
            <div class="search-wrapper">
              <i class="bi bi-search"></i>
              <input type="text" id="search" placeholder="Search movies..." />
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="app">
      <section class="filters-bar">
        <div class="filters-container">
          <div class="filter-controls">
            <div class="control-group">
              <label for="genreFilter">Genre</label>
              <select id="genreFilter" class="filter-select">
                <option value="" selected>All Genres</option>
                <option value="28">Action</option>
                <option value="35">Comedy</option>
                <option value="18">Drama</option>
                <option value="27">Horror</option>
                <option value="10749">Romance</option>
              </select>
            </div>

            <div class="control-group">
              <label for="sortFilter">Sort</label>
              <select id="sortFilter" class="filter-select">
                <option value="default">Popular</option>
                <option value="rating">Highest Rated</option>
                <option value="title">A - Z</option>
              </select>
            </div>

            <button
              id="clearFilters"
              class="clear-btn"
              aria-label="Remove filters">
              <i class="bi bi-x-circle"></i>
              Remove Filter
            </button>
          </div>
        </div>
      </section>

      <section id="movies" class="movies-grid"></section>

      <p id="loadingState" class="loading-state"></p>

      <div id="scrollSentinel"></div>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
